<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางเรียน ม.5/4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FBF8F3;
  --warm:#F5EFE6;
  --sand:#E8DDD0;
  --clay:#C9B8A8;
  --terracotta:#C07A5A;
  --ink:#2C2416;
  --muted:#7A6E64;
  --accent:#D4956A;
}
html,body{min-height:100vh;background:var(--cream);font-family:'Sarabun',sans-serif;color:var(--ink);overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(201,184,168,.2) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 80%,rgba(192,122,90,.1) 0%,transparent 55%);
}
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem 4rem}

header{text-align:center;margin-bottom:2.5rem}
.badge{display:inline-block;background:var(--sand);color:var(--muted);font-family:'Kanit',sans-serif;font-size:.72rem;font-weight:400;letter-spacing:.12em;padding:5px 14px;border-radius:20px;margin-bottom:.9rem;text-transform:uppercase}
h1{font-family:'Kanit',sans-serif;font-size:clamp(1.6rem,4vw,2.6rem);font-weight:500;color:var(--ink);line-height:1.15;margin-bottom:.4rem}
h1 span{color:var(--terracotta)}
.sub{font-size:.9rem;color:var(--muted);font-weight:300}

.now-card{background:var(--ink);color:var(--cream);border-radius:18px;padding:1.2rem 1.8rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap}
.now-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.now-label{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;opacity:.5;font-family:'Kanit',sans-serif;font-weight:300}
.now-text{font-family:'Kanit',sans-serif;font-size:1.05rem;font-weight:500}
.now-time{margin-left:auto;font-family:'Kanit',sans-serif;font-size:1.8rem;font-weight:300;opacity:.7;letter-spacing:.05em}
.now-remain{width:100%;font-size:.8rem;opacity:.55;font-weight:300;border-top:1px solid rgba(255,255,255,.1);padding-top:.6rem;margin-top:.2rem}
.now-remain.warn{opacity:1;color:#FFAA80;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.week-tabs{display:flex;gap:6px;margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.week-tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;border:1.5px solid var(--sand);background:transparent;color:var(--muted);font-family:'Kanit',sans-serif;font-size:.85rem;font-weight:400;padding:7px 18px;border-radius:30px;cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:var(--clay);color:var(--ink)}
.tab-btn.today{border-color:var(--terracotta);color:var(--terracotta)}
.tab-btn.active{background:var(--ink);border-color:var(--ink);color:var(--cream)}
.tab-btn.active.today{background:var(--terracotta);border-color:var(--terracotta);color:#fff}

.day-view{display:none}
.day-view.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.periods-grid{display:grid;gap:10px}
.period-row{display:grid;grid-template-columns:52px 1fr;gap:10px;align-items:stretch}
.period-num{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.p-num{font-family:'Kanit',sans-serif;font-size:1.3rem;font-weight:300;color:var(--clay);line-height:1}
.p-time{font-size:.58rem;color:var(--clay);text-align:center;line-height:1.3;opacity:.7}

.period-card{border-radius:14px;padding:1rem 1.3rem;border:1.5px solid transparent;transition:all .2s;position:relative;overflow:hidden;min-height:72px;display:flex;flex-direction:column;justify-content:center}
.period-card.empty{background:var(--warm);border-color:var(--sand)}
.period-card.break-card{background:var(--warm);border-color:var(--sand);flex-direction:row;align-items:center;gap:8px;min-height:52px}
.break-text{font-size:.8rem;color:var(--muted);font-weight:300}
.period-card.has-class{background:#fff;border-color:var(--sand)}
.period-card.has-class:hover{border-color:var(--clay);transform:translateX(2px)}
.period-card.current{background:var(--ink) !important;border-color:var(--ink) !important}
.period-card.current .subj{color:var(--cream) !important}
.period-card.current .meta{color:rgba(251,248,243,.55) !important}
.period-card.current .color-tag{opacity:.4}

.color-tag{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.subj{font-family:'Kanit',sans-serif;font-size:1rem;font-weight:500;color:var(--ink);margin-bottom:3px}
.meta{font-size:.78rem;color:var(--muted);font-weight:300;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.room-tag{background:var(--warm);border:1px solid var(--sand);border-radius:6px;padding:1px 7px;font-size:.7rem;color:var(--muted);font-weight:400;flex-shrink:0}

.full-table-wrap{margin-top:2rem}
.section-label{font-family:'Kanit',sans-serif;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--clay);margin-bottom:1rem;font-weight:400}
.tbl-scroll{overflow-x:auto;border-radius:16px;border:1.5px solid var(--sand)}
table{width:100%;border-collapse:collapse;min-width:780px;background:#fff}
thead tr{background:var(--warm)}
thead th{font-family:'Kanit',sans-serif;font-size:.72rem;font-weight:400;color:var(--muted);letter-spacing:.05em;padding:10px 6px;text-align:center;border-bottom:1.5px solid var(--sand);white-space:nowrap;line-height:1.4}
thead th:first-child{text-align:left;padding-left:16px;min-width:56px}
tbody tr{border-bottom:1px solid var(--sand)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--cream)}
tbody td{padding:9px 6px;text-align:center;vertical-align:middle;font-size:.76rem}
tbody td:first-child{text-align:left;padding-left:16px;font-family:'Kanit',sans-serif;font-size:.9rem;font-weight:500;color:var(--muted);white-space:nowrap}
.ci{display:inline-flex;flex-direction:column;align-items:center;gap:2px}
.cs{font-family:'Kanit',sans-serif;font-size:.76rem;font-weight:500;color:var(--ink);line-height:1.2}
.ct{font-size:.62rem;color:var(--muted);font-weight:300}
.cr{font-size:.6rem;color:var(--terracotta);font-weight:400;background:#FEF3EE;border-radius:4px;padding:1px 5px}
.ce{color:var(--clay);font-size:.68rem;opacity:.4}
td.tbl-current{background:var(--ink) !important}
td.tbl-current .cs{color:var(--cream)}
td.tbl-current .ct{color:rgba(251,248,243,.5)}
td.tbl-current .cr{background:rgba(255,255,255,.15);color:rgba(251,248,243,.7)}

@media(max-width:600px){
  .page{padding:1.5rem 1rem 3rem}
  h1{font-size:1.4rem}
  .now-time{font-size:1.3rem}
  .period-row{grid-template-columns:44px 1fr}
  .full-table-wrap{display:none}
}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="badge">ภาคเรียนที่ 1 / 2569</div>
  <h1>ตารางเรียน <span>ม.5/4</span></h1>
  <p class="sub">โรงเรียนศรีกระนวนวิทยาคม &nbsp;·&nbsp; ห้องประจำ 431</p>
</header>

<div class="now-card">
  <div class="now-dot"></div>
  <div>
    <div class="now-label">ตอนนี้</div>
    <div class="now-text" id="nowText">กำลังโหลด...</div>
  </div>
  <div class="now-time" id="nowTime">--:--</div>
  <div class="now-remain" id="nowRemain" style="display:none"></div>
</div>

<div class="week-tabs" id="tabs"></div>
<div id="dayViews"></div>

<div class="full-table-wrap">
  <div class="section-label">ตารางรวมทุกวัน</div>
  <div class="tbl-scroll">
    <table>
      <thead>
        <tr>
          <th>วัน</th>
          <th>0<br><span style="opacity:.6;font-weight:300">08:00–08:40</span></th>
          <th>1<br><span style="opacity:.6;font-weight:300">08:40–09:35</span></th>
          <th>2<br><span style="opacity:.6;font-weight:300">09:35–10:30</span></th>
          <th>3<br><span style="opacity:.6;font-weight:300">10:30–11:25</span></th>
          <th>4(ม.ปลาย)<br><span style="opacity:.6;font-weight:300">11:25–12:20</span></th>
          <th>พัก<br><span style="opacity:.6;font-weight:300">12:20–13:15</span></th>
          <th>5<br><span style="opacity:.6;font-weight:300">13:15–14:10</span></th>
          <th>6<br><span style="opacity:.6;font-weight:300">14:10–15:05</span></th>
          <th>7<br><span style="opacity:.6;font-weight:300">15:05–16:00</span></th>
        </tr>
      </thead>
      <tbody id="fullTableBody"></tbody>
    </table>
  </div>
</div>

</div>
<script>
// schedule data — decoded from image
// periods index: 0=คาบ0, 1=คาบ1, 2=คาบ2, 3=คาบ3, 4=คาบ4(ม.ปลาย), 5=BREAK, 6=คาบ5, 7=คาบ6, 8=คาบ7
var sch={
  1:{name:'จันทร์',short:'จ.',p:[
    {s:'ชีววิทยา',c:'ว30203',t:'ภัรัตน์',r:'431',col:'#7EAB68'},
    {s:'ชีววิทยา',c:'ว30203',t:'ภัรัตน์',r:'431',col:'#7EAB68'},
    {s:'สังคม',c:'ส32102',t:'ปรินทร์',r:'431',col:'#9B7BB8'},
    {s:'สังคม',c:'ส32101',t:'เพ็ญ',r:'431',col:'#9B7BB8'},
    'break',
    {s:'คณิตศาสตร์',c:'ค32201',t:'นนท์ทิยา',r:'431',col:'#6A8DC4'},
    {s:'คณิตศาสตร์',c:'ค32201',t:'จิราภา',r:'431',col:'#6A8DC4'},
    {s:'ต้านทุจริต',c:'-',t:'-',r:'-',col:'#A09090'}
  ]},
  2:{name:'อังคาร',short:'อ.',p:[
    {s:'สังคม',c:'อ32101',t:'Simon',r:'227',col:'#6AA8B8'},
    {s:'สังคม',c:'ส32101',t:'ชลิดา',r:'431',col:'#9B7BB8'},
    {s:'คณิตศาสตร์',c:'ค32101',t:'นนท์ทิยา',r:'431',col:'#6A8DC4'},
    {s:'วิทยาศาสตร์',c:'ว32102',t:'ชณาญ',r:'ICT3',col:'#5F9EA0'},
    'break',
    {s:'วิทยาศาสตร์',c:'ว32101',t:'สินา',r:'431',col:'#5F9EA0'},
    {s:'วิทยาศาสตร์',c:'ว32101',t:'สินา',r:'431',col:'#5F9EA0'},
    {s:'อังกฤษ',c:'อ32201',t:'จิระ',r:'431',col:'#6AA8B8'}
  ]},
  3:{name:'พุธ',short:'พ.',p:[
    {s:'วิทยาศาสตร์',c:'ง32101',t:'สมคว',r:'431',col:'#5F9EA0'},
    {s:'การงาน',c:'ง30221',t:'ดารุณี',r:'431',col:'#B89B6A'},
    {s:'ดาราศาสตร์',c:'ว30221',t:'ดารุณี',r:'431',col:'#7B7FC4'},
    {s:'คณิตศาสตร์',c:'ค32101',t:'นนท์ทิยา',r:'431',col:'#6A8DC4'},
    'break',
    {s:'สุขภาพ',c:'พ32101',t:'นราภ',r:'431',col:'#6AAE7A'},
    {s:'ชีววิทยา',c:'ว30203',t:'ภัรัตน์',r:'431',col:'#7EAB68'},
    {s:'ชีววิทยา',c:'ว30203',t:'ภัรัตน์',r:'431',col:'#7EAB68'}
  ]},
  4:{name:'พฤหัส',short:'พฤ.',p:[
    {s:'คณิตศาสตร์',c:'ค32101',t:'นนท์ทิยา',r:'431',col:'#6A8DC4'},
    {s:'อังกฤษ',c:'อ32201',t:'จิรเวช',r:'431',col:'#6AA8B8'},
    {s:'การงาน',c:'ว30243',t:'จิราภา',r:'431',col:'#B89B6A'},
    {s:'การงาน',c:'ว30243',t:'จิราภา',r:'431',col:'#B89B6A'},
    'break',
    {s:'แนะแนว',c:'-',t:'ลำดว',r:'431',col:'#B0A090'},
    {s:'วิทยาศาสตร์',c:'พ32101',t:'อิสระ',r:'431',col:'#5F9EA0'},
    {s:'กิจกรรมชุมนุม',c:'-',t:'-',r:'-',col:'#808080'}
  ]},
  5:{name:'ศุกร์',short:'ศ.',p:[
    {s:'ไทย',c:'ท32101',t:'นราภ',r:'431',col:'#C48A6A'},
    {s:'อังกฤษ',c:'อ32201',t:'นนท์ทิยา',r:'431',col:'#6AA8B8'},
    {s:'IS',c:'I30903',t:'จารุพ',r:'511',col:'#909090'},
    {s:'วิทยาศาสตร์',c:'ส32101',t:'คูดน',r:'431',col:'#5F9EA0'},
    'break',
    {s:'สังคม',c:'จ32201',t:'กานติ',r:'431',col:'#9B7BB8'},
    {s:'ดาราศาสตร์',c:'ว30221',t:'ดารุณี',r:'431',col:'#7B7FC4'},
    {s:'สังคม',c:'ส32101',t:'ชลิดา',r:'431',col:'#9B7BB8'}
  ]}
};

var periods=[
  {label:'0',start:'08:00',end:'08:40'},
  {label:'1',start:'08:40',end:'09:35'},
  {label:'2',start:'09:35',end:'10:30'},
  {label:'3',start:'10:30',end:'11:25'},
  {label:'4',start:'11:25',end:'12:20'},
  {label:'พัก',start:'12:20',end:'13:15'},
  {label:'5',start:'13:15',end:'14:10'},
  {label:'6',start:'14:10',end:'15:05'},
  {label:'7',start:'15:05',end:'16:00'}
];

function toMin(t){var p=t.split(':');return+p[0]*60+ +p[1]}
function pad(n){return n<10?'0'+n:''+n}

function getState(){
  var now=new Date(),d=now.getDay(),h=now.getHours(),m=now.getMinutes();
  var cur=h*60+m;
  if(d===0||d===6)return{status:'weekend'};
  if(cur<toMin('08:00'))return{status:'before'};
  if(cur>=toMin('16:00'))return{status:'after'};
  for(var i=0;i<periods.length;i++){
    var p=periods[i],ps=toMin(p.start),pe=toMin(p.end);
    if(cur>=ps&&cur<pe){
      var left=pe-cur;
      if(p.label==='พัก')return{status:'break',left:left,end:p.end};
      var cl=sch[d]&&sch[d].p[i];
      if(!cl||cl==='break')return{status:'free',left:left,end:p.end,period:i,day:d};
      return{status:'class',data:cl,left:left,end:p.end,period:i,day:d};
    }
  }
  return{status:'between'};
}

function tick(){
  var s=getState(),n=new Date();
  document.getElementById('nowTime').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  var txt='',remain='',warn=false;
  if(s.status==='weekend')txt='วันหยุด';
  else if(s.status==='before')txt='ก่อนเวลาเรียน';
  else if(s.status==='after')txt='เลิกเรียนแล้ว';
  else if(s.status==='break'){txt='พักเที่ยง ม.ปลาย';remain='หมดเวลา '+s.end+' — เหลืออีก '+s.left+' นาที';}
  else if(s.status==='free'){txt='คาบว่าง';remain='เหลืออีก '+s.left+' นาที';}
  else if(s.status==='class'&&s.data){
    var d=s.data;
    txt=d.s+(d.t&&d.t!=='-'?' — '+d.t:'')+(d.r&&d.r!=='-'?' · ห้อง '+d.r:'');
    remain='เหลืออีก '+s.left+' นาที (หมดคาบ '+s.end+')';
    warn=s.left<=10;
  }else txt='ระหว่างคาบ';
  document.getElementById('nowText').textContent=txt;
  var nr=document.getElementById('nowRemain');
  if(remain){nr.textContent=remain;nr.style.display='block';nr.className='now-remain'+(warn?' warn':'');}
  else nr.style.display='none';

  document.querySelectorAll('.period-card').forEach(function(el){el.classList.remove('current')});
  if((s.status==='class'||s.status==='free')&&s.day&&s.period!==undefined){
    var el=document.querySelector('[data-day="'+s.day+'"][data-period="'+s.period+'"]');
    if(el)el.classList.add('current');
  }
  document.querySelectorAll('.tbl-current').forEach(function(el){el.classList.remove('tbl-current')});
  if(s.status==='class'&&s.day&&s.period!==undefined){
    var el2=document.querySelector('.tbl-td[data-day="'+s.day+'"][data-period="'+s.period+'"]');
    if(el2)el2.classList.add('tbl-current');
  }
}

function buildDayView(d){
  var day=sch[d],now=new Date().getDay();
  var div=document.createElement('div');
  div.className='day-view'+(d===now?' active':'');
  div.id='dv'+d;
  var grid=document.createElement('div');
  grid.className='periods-grid';
  day.p.forEach(function(cl,i){
    var p=periods[i];
    var row=document.createElement('div');
    row.className='period-row';
    var num=document.createElement('div');
    num.className='period-num';
    num.innerHTML='<div class="p-num">'+p.label+'</div><div class="p-time">'+p.start+'<br>'+p.end+'</div>';
    row.appendChild(num);
    var card=document.createElement('div');
    card.setAttribute('data-day',d);
    card.setAttribute('data-period',i);
    if(cl==='break'){
      card.className='period-card break-card';
      card.innerHTML='<div class="break-text">พักเที่ยง ม.ปลาย</div>';
    }else if(!cl){
      card.className='period-card empty';
      card.innerHTML='<span style="font-size:.8rem;color:var(--clay);opacity:.5">ว่าง</span>';
    }else{
      card.className='period-card has-class';
      var roomHtml=cl.r&&cl.r!=='-'?'<span class="room-tag">'+cl.r+'</span>':'';
      var teacherHtml=cl.t&&cl.t!=='-'?'<span>'+cl.t+'</span>':'';
      card.innerHTML=
        '<div class="color-tag" style="background:'+cl.col+'"></div>'+
        '<div class="subj">'+cl.s+'</div>'+
        '<div class="meta">'+teacherHtml+roomHtml+'</div>';
    }
    row.appendChild(card);
    grid.appendChild(row);
  });
  div.appendChild(grid);
  return div;
}

function buildTabs(){
  var tabs=document.getElementById('tabs'),now=new Date().getDay();
  [1,2,3,4,5].forEach(function(d){
    var btn=document.createElement('button');
    btn.className='tab-btn'+(d===now?' today active':'');
    btn.textContent=sch[d].name;
    btn.onclick=function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
      document.querySelectorAll('.day-view').forEach(function(v){v.classList.remove('active')});
      btn.classList.add('active');
      document.getElementById('dv'+d).classList.add('active');
    };
    tabs.appendChild(btn);
  });
}

function buildFullTable(){
  var tbody=document.getElementById('fullTableBody'),now=new Date().getDay(),s=getState();
  [1,2,3,4,5].forEach(function(d){
    var day=sch[d],tr=document.createElement('tr');
    var td0=document.createElement('td');td0.textContent=day.short;tr.appendChild(td0);
    day.p.forEach(function(cl,i){
      var td=document.createElement('td');
      td.className='tbl-td';
      td.setAttribute('data-day',d);
      td.setAttribute('data-period',i);
      if(cl==='break'){
        td.innerHTML='<span class="ce">พัก</span>';
      }else if(!cl){
        td.innerHTML='<span class="ce">—</span>';
      }else{
        var roomHtml=cl.r&&cl.r!=='-'?'<span class="cr">'+cl.r+'</span>':'';
        var teacherHtml=cl.t&&cl.t!=='-'?'<span class="ct">'+cl.t+'</span>':'';
        td.innerHTML='<div class="ci"><span class="cs">'+cl.s+'</span>'+teacherHtml+roomHtml+'</div>';
      }
      if(s.status==='class'&&d===now&&s.period===i)td.classList.add('tbl-current');
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

buildTabs();
var views=document.getElementById('dayViews');
[1,2,3,4,5].forEach(function(d){views.appendChild(buildDayView(d))});
buildFullTable();
tick();
setInterval(tick,1000);
</script>
</body>
</html>
